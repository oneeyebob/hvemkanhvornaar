<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Hvem Kan Hvor Naar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style type="text/tailwindcss">
    @layer base {
      html { font-family: 'Inter', system-ui, sans-serif; }
    }
    @layer components {
      .btn { @apply inline-flex items-center justify-center gap-2 rounded-lg px-4 py-2.5 text-sm font-semibold transition focus:outline-none focus:ring-2 focus:ring-offset-2 disabled:opacity-50; }
      .btn-primary { @apply bg-indigo-600 text-white hover:bg-indigo-500 focus:ring-indigo-500; }
      .field-label { @apply block text-sm font-medium text-slate-700 mb-1.5; }
      .field-input { @apply block w-full rounded-lg border-0 px-3.5 py-2.5 text-slate-900 ring-1 ring-inset ring-slate-300 placeholder:text-slate-400 focus:ring-2 focus:ring-inset focus:ring-indigo-500 text-sm; }
      .message { @apply rounded-lg p-3.5 text-sm font-medium mb-4; }
      .message.error { @apply bg-red-50 text-red-700 ring-1 ring-inset ring-red-200; }
      .message.success { @apply bg-green-50 text-green-700 ring-1 ring-inset ring-green-200; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-slate-200 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-indigo-600 text-white text-xl font-bold mb-4 shadow-lg shadow-indigo-600/30">📅</div>
      <h1 class="text-2xl font-bold text-slate-900">Hvem Kan Hvor Naar</h1>
      <p class="text-sm text-slate-500 mt-1">Log ind for at fortsætte</p>
    </div>

    <div class="rounded-2xl bg-white p-6 sm:p-8 shadow-xl shadow-slate-200/60 ring-1 ring-slate-200">
      <div id="message" class="message hidden"></div>

      <form id="loginForm" class="space-y-5">
        <div>
          <label class="field-label" for="username">Brugernavn</label>
          <input class="field-input" type="text" id="username" name="username" required>
        </div>

        <div>
          <label class="field-label" for="password">Kodeord</label>
          <input class="field-input" type="password" id="password" name="password" required>
        </div>

        <button type="submit" class="btn btn-primary w-full">Login</button>
      </form>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin + '/api';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const messageEl = document.getElementById('message');

      try {
        const response = await fetch(`${API_BASE}/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Login mislykkedes');
        }

        // Store user and token in localStorage
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('token', data.token);

        // Redirect based on role
        if (data.user.role === 'admin') {
          window.location.href = 'admin.html';
        } else {
          window.location.href = 'polls.html';
        }
      } catch (err) {
        messageEl.textContent = err.message;
        messageEl.className = 'message error';
        messageEl.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
